<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wild Reading — A Rough Trade Writing School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Spectral+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0b09;
    --dark: #1a1510;
    --ink: #2a2218;
    --paper: #f0e8d8;
    --paper-dark: #d8ccb4;
    --cream: #faf5ec;
    --gold: #c8962a;
    --gold-dim: rgba(200,150,42,0.6);
    --gold-faint: rgba(200,150,42,0.1);
    --gold-ghost: rgba(200,150,42,0.05);
    --rose: #8b3a52;
    --rose-dim: rgba(139,58,82,0.6);
    --rose-faint: rgba(139,58,82,0.1);
    --sage: #4a6741;
    --sage-faint: rgba(74,103,65,0.1);
    --font-serif: 'Spectral', Georgia, serif;
    --font-sc: 'Spectral SC', Georgia, serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--paper);
    font-family: var(--font-serif);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── BOOT ── */
  #boot {
    position: fixed;
    inset: 0;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 999;
    transition: opacity 1.2s ease;
  }

  #boot.out { opacity: 0; pointer-events: none; }

  .boot-sigil {
    width: 80px;
    height: 80px;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: breathe 4s ease-in-out infinite;
  }

  .boot-sigil::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 0.5px solid rgba(200,150,42,0.3);
    border-radius: 50%;
  }

  .boot-sigil-inner {
    font-family: var(--font-sc);
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.03); }
  }

  .boot-title {
    font-family: var(--font-sc);
    font-size: clamp(18px, 3vw, 26px);
    color: var(--gold);
    letter-spacing: 0.15em;
    text-align: center;
    font-weight: 400;
  }

  .boot-sub {
    font-family: var(--font-serif);
    font-size: 14px;
    color: rgba(240,232,216,0.4);
    font-style: italic;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .boot-rule {
    width: 120px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    animation: shimmer 2s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ── APP ── */
  #app {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  #app.visible { opacity: 1; }

  /* ── HEADER ── */
  .site-header {
    text-align: center;
    padding: 0 0 48px;
    position: relative;
  }

  .header-eyebrow {
    font-family: var(--font-sc);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: block;
  }

  .header-title {
    font-family: var(--font-sc);
    font-size: clamp(32px, 6vw, 56px);
    color: var(--paper);
    font-weight: 400;
    letter-spacing: 0.08em;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .header-title em {
    color: var(--gold);
    font-style: italic;
    font-family: var(--font-serif);
  }

  .header-desc {
    font-size: 16px;
    color: rgba(240,232,216,0.6);
    max-width: 46ch;
    margin: 0 auto 24px;
    font-style: italic;
    line-height: 1.65;
  }

  .header-rule {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
    margin-top: 20px;
  }

  .header-rule-line {
    height: 0.5px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }

  .header-rule-line.r {
    background: linear-gradient(90deg, var(--gold-dim), transparent);
  }

  .header-rule-mark {
    font-family: var(--font-sc);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
  }

  /* ── PROGRESS ── */
  .progress-track {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 40px;
    justify-content: center;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    border: 1px solid rgba(200,150,42,0.3);
    transition: all 0.4s ease;
  }

  .progress-dot.done {
    background: var(--gold);
    border-color: var(--gold);
  }

  .progress-dot.active {
    background: transparent;
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(200,150,42,0.5);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 4px rgba(200,150,42,0.4); }
    50% { box-shadow: 0 0 12px rgba(200,150,42,0.7); }
  }

  .progress-line {
    height: 0.5px;
    width: 24px;
    background: rgba(200,150,42,0.2);
    transition: background 0.4s ease;
  }

  .progress-line.done { background: var(--gold-dim); }

  /* ── CHAT ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 28px;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 5px;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.school { align-items: flex-start; }
  .msg.writer { align-items: flex-end; }

  .msg-label {
    font-family: var(--font-sc);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .msg.school .msg-label { color: var(--gold-dim); }
  .msg.writer .msg-label { color: rgba(240,232,216,0.3); }

  .msg-bubble {
    max-width: 78%;
    padding: 14px 20px;
    font-size: 16px;
    line-height: 1.7;
  }

  .msg.school .msg-bubble {
    background: var(--gold-ghost);
    border: 0.5px solid rgba(200,150,42,0.2);
    border-left: 2px solid var(--gold-dim);
    color: var(--paper);
    border-radius: 0 6px 6px 6px;
  }

  .msg.writer .msg-bubble {
    background: rgba(240,232,216,0.04);
    border: 0.5px solid rgba(240,232,216,0.1);
    color: rgba(240,232,216,0.7);
    border-radius: 6px 0 6px 6px;
    font-style: italic;
  }

  /* ── TYPING ── */
  .typing-row {
    display: none;
    align-items: flex-start;
  }

  .typing-row.on { display: flex; }

  .typing-bub {
    background: var(--gold-ghost);
    border: 0.5px solid rgba(200,150,42,0.2);
    border-left: 2px solid var(--gold-dim);
    border-radius: 0 6px 6px 6px;
    padding: 14px 20px;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .typing-bub span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold-dim);
    animation: dotup 1.3s ease-in-out infinite;
  }

  .typing-bub span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bub span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotup {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── SPREAD CONTAINER ── */
  .spread-wrap {
    margin: 12px 0;
    animation: fadeUp 0.6s ease;
  }

  .spread-title {
    font-family: var(--font-sc);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    text-align: center;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: center;
  }

  .spread-title-line {
    height: 0.5px;
    flex: 1;
    background: linear-gradient(90deg, transparent, rgba(200,150,42,0.3));
  }

  .spread-title-line.r {
    background: linear-gradient(90deg, rgba(200,150,42,0.3), transparent);
  }

  /* ── TAROT CROSS LAYOUT ── */
  .tarot-cross {
    display: grid;
    grid-template-areas:
      ". top ."
      "left center right"
      ". bottom .";
    grid-template-columns: 1fr 1.2fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 16px;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── TAROT CARD ── */
  .tarot-card {
    position: relative;
    background: var(--dark);
    border: 1px solid rgba(200,150,42,0.25);
    padding: 20px 18px 18px;
    border-radius: 4px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
  }

  .tarot-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 16px rgba(200,150,42,0.1);
  }

  .tarot-card.center-card {
    grid-area: center;
    border-color: rgba(200,150,42,0.45);
    background: var(--ink);
    box-shadow: 0 0 30px rgba(200,150,42,0.08);
  }

  .tarot-card.top-card    { grid-area: top; }
  .tarot-card.left-card   { grid-area: left; }
  .tarot-card.right-card  { grid-area: right; }
  .tarot-card.bottom-card { grid-area: bottom; }

  /* Crossing card overlay for center */
  .tarot-card.crossing-card {
    grid-area: center;
    background: rgba(139,58,82,0.08);
    border-color: rgba(139,58,82,0.35);
    transform: none;
    margin-top: -6px;
    margin-left: 6px;
    position: relative;
  }

  .tarot-card.crossing-card:hover {
    transform: rotate(1deg) translateY(-2px);
  }

  /* Stack center and crossing */
  .center-stack {
    grid-area: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-position {
    font-family: var(--font-sc);
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .crossing-card .card-position {
    color: var(--rose-dim);
  }

  .card-name {
    font-family: var(--font-serif);
    font-size: 15px;
    font-style: italic;
    color: var(--gold);
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .center-card .card-name {
    font-size: 17px;
  }

  .crossing-card .card-name {
    color: var(--rose);
  }

  .card-rule {
    height: 0.5px;
    background: rgba(200,150,42,0.2);
    margin-bottom: 10px;
  }

  .crossing-card .card-rule {
    background: rgba(139,58,82,0.25);
  }

  .card-text {
    font-size: 13.5px;
    line-height: 1.65;
    color: rgba(240,232,216,0.75);
  }

  /* ── RECOMMENDATION CARD ── */
  .rec-card {
    background: var(--dark);
    border: 0.5px solid rgba(200,150,42,0.25);
    border-top: 2px solid var(--gold);
    padding: 24px;
    border-radius: 4px;
    grid-area: bottom;
    text-decoration: none;
    display: block;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .rec-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .rec-card .card-position { color: var(--sage); opacity: 0.8; }
  .rec-card .card-name { color: var(--gold); }
  .rec-card .card-rule { background: rgba(200,150,42,0.15); }

  .rec-cta {
    display: inline-block;
    margin-top: 12px;
    font-family: var(--font-sc);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    border-bottom: 0.5px solid var(--gold-dim);
    padding-bottom: 2px;
  }

  /* ── INPUT ── */
  .input-area {
    margin-top: 8px;
  }

  .input-label {
    font-family: var(--font-sc);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(200,150,42,0.4);
    margin-bottom: 8px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 0;
    align-items: stretch;
  }

  #user-input {
    flex: 1;
    background: rgba(240,232,216,0.03);
    border: 0.5px solid rgba(240,232,216,0.12);
    border-right: none;
    padding: 13px 18px;
    font-family: var(--font-serif);
    font-size: 16px;
    color: var(--paper);
    resize: none;
    min-height: 50px;
    max-height: 140px;
    outline: none;
    line-height: 1.55;
    transition: border-color 0.2s;
    border-radius: 3px 0 0 3px;
  }

  #user-input:focus {
    border-color: rgba(200,150,42,0.35);
    background: rgba(200,150,42,0.03);
  }

  #user-input::placeholder {
    color: rgba(240,232,216,0.2);
    font-style: italic;
  }

  #send-btn {
    background: var(--gold-faint);
    border: 0.5px solid rgba(200,150,42,0.35);
    border-left: none;
    padding: 13px 20px;
    font-family: var(--font-sc);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    border-radius: 0 3px 3px 0;
  }

  #send-btn:hover { background: rgba(200,150,42,0.15); }
  #send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ── DIVIDER ── */
  .ornament {
    text-align: center;
    margin: 16px 0;
    font-size: 12px;
    color: rgba(200,150,42,0.2);
    letter-spacing: 0.3em;
  }

  /* ── FOOTER ── */
  .site-footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 0.5px solid rgba(200,150,42,0.15);
    text-align: center;
    font-size: 12px;
    color: rgba(240,232,216,0.25);
    font-style: italic;
    line-height: 1.9;
  }

  .site-footer a {
    color: rgba(200,150,42,0.4);
    text-decoration: none;
  }

  .site-footer a:hover { color: var(--gold); }

  @media (max-width: 600px) {
    #app { padding: 32px 16px 60px; }

    .tarot-cross {
      grid-template-areas:
        "top"
        "center"
        "crossing"
        "left"
        "right"
        "bottom";
      grid-template-columns: 1fr;
    }

    .center-stack {
      grid-area: unset;
      display: contents;
    }

    .tarot-card.center-card { grid-area: center; }
    .tarot-card.crossing-card { grid-area: crossing; }
    .tarot-card.top-card { grid-area: top; }
    .tarot-card.left-card { grid-area: left; }
    .tarot-card.right-card { grid-area: right; }
    .rec-card { grid-area: bottom; }

    .msg-bubble { max-width: 92%; }
  }
</style>
</head>
<body>

<!-- BOOT -->
<div id="boot">
  <div class="boot-sigil">
    <div class="boot-sigil-inner">✦</div>
  </div>
  <div class="boot-rule"></div>
  <div class="boot-title">A Rough Trade Writing School</div>
  <div class="boot-sub">The Wild Reading</div>
</div>

<!-- APP -->
<div id="app">
  <header class="site-header">
    <span class="header-eyebrow">A Rough Trade Writing School</span>
    <h1 class="header-title">The <em>Wild</em> Reading</h1>
    <p class="header-desc">A writer's diagnostic. Five questions, then a spread laid just for you.</p>
    <div class="header-rule">
      <div class="header-rule-line"></div>
      <span class="header-rule-mark">✦</span>
      <div class="header-rule-line r"></div>
    </div>
  </header>

  <!-- PROGRESS -->
  <div class="progress-track" id="progress-track">
    <div class="progress-dot active" id="dot-0"></div>
    <div class="progress-line" id="line-0"></div>
    <div class="progress-dot" id="dot-1"></div>
    <div class="progress-line" id="line-1"></div>
    <div class="progress-dot" id="dot-2"></div>
    <div class="progress-line" id="line-2"></div>
    <div class="progress-dot" id="dot-3"></div>
    <div class="progress-line" id="line-3"></div>
    <div class="progress-dot" id="dot-4"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat-area">
    <div class="typing-row" id="typing">
      <div class="typing-bub">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <span class="input-label">Your answer</span>
    <div class="input-row">
      <textarea id="user-input" placeholder="Write here…" rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <footer class="site-footer">
    <a href="https://arough.trade">A Rough Trade Writing School</a> · 
    <a href="https://arough.trade/chains">The Chains</a> · 
    <a href="https://stagandbirch.com/collection/wild-magic">The Shop</a> · 
    <a href="https://patreon.com/jacobtwop">The School</a>
  </footer>
</div>

<script>
const PROXY_URL = '/.netlify/functions/chat';
const MODEL = 'claude-sonnet-4-5';

const SYSTEM = `You are the intake reader for A Rough Trade Writing School — Jacob Clifton's literary writing school. You conduct The Wild Reading: a five-question diagnostic conversation that ends with a personalized tarot spread laid for the writer.

YOUR VOICE:
Literary, specific, warm without being saccharine. You hold contradiction comfortably. You speak like someone who has read widely, thought deeply, and come out the other side willing to tell the complicated truth instead of the easy answer. You do not flatter. You do not hype. You clarify.

You use em dashes for asides and pauses. Short declarative sentences for impact. Varied rhythm — never uniform. Dry wit delivered through phrasing, not announced. You never say "ensure," "landscape," "leverage," "innovative," or any AI tell. You never oversimplify human experience.

The voice asks questions that make the writer think differently about their situation just by answering them. It's interested in the writer in the way a good teacher is interested — not performing interest, actually having it.

THE FIVE QUESTIONS — ask one at a time, wait for each answer:

Q1: "What are you working on right now — and be honest about whether you're actually working on it, or just carrying it around."

Q2: "When did writing last feel like the thing itself, rather than the thing you were supposed to be doing? What were the circumstances?"

Q3: "What's the story you tell yourself about why you're not further along?"

Q4: "If you stopped protecting the work — from judgment, from failure, from being seen — what would you actually write?"

Q5: "What kind of help do you actually respond to? Structure, permission, company, a mirror, a kick?"

After each answer, you may ask one brief follow-up if something genuinely interesting opens up — something specific they said that deserves a thread pulled. One follow-up maximum. Don't follow up just to seem engaged. If their answer is complete and clear, move to the next question.

After Q5, tell them you have what you need. Then produce the spread, wrapped in [SPREAD_START] and [SPREAD_END] tags.

CRITICAL: You MUST produce the spread wrapped in [SPREAD_START] and [SPREAD_END] tags. Never produce it as plain text. Never summarize. Always output the complete spread.

THE SPREAD FORMAT — produce valid JSON between the tags:

[SPREAD_START]
{
  "state": {
    "name": "[An evocative tarot-style card name — specific to this writer, poetic, 2-5 words — e.g. 'The Unfinished Letter' or 'The Circling Hawk']",
    "text": "[2-3 sentences. What this writer's actual state is right now. Not what they said — what you heard underneath what they said. Specific. Literary. No flattery.]"
  },
  "covering": {
    "name": "[An evocative card name for what's in the way — e.g. 'The Borrowed Voice' or 'The Waiting Room']",
    "text": "[2 sentences. The specific thing covering their voice — named plainly, held with warmth but without softening. Based directly on what they told you.]"
  },
  "practice": {
    "name": "[Card name for the practice prescription — e.g. 'The Daily Threshold' or 'The Small Fire']",
    "text": "[1-2 sentences. One concrete practice prescription — specific to their situation, not generic. What to actually do, based on what kind of help they said they respond to.]"
  },
  "reading": {
    "name": "[Card name for the reading prescription — e.g. 'The Necessary Book' or 'The Borrowed Light']",
    "text": "[1-2 sentences. One book, essay, or piece of writing they should read right now, and exactly why this one for this writer at this moment. Be specific. Name the actual work.]"
  },
  "path": {
    "name": "[Card name for their path — e.g. 'The Open Chain' or 'The First Door']",
    "text": "[2 sentences. The specific ART School offer that fits where they are right now, and why this one. Be direct about the match.]",
    "offer": "[one of: 'chains', 'books', 'school']",
    "chain": "[if offer is 'chains': the specific chain name e.g. 'Chain 5: Voice' — otherwise null]"
  }
}
[SPREAD_END]

OFFER ROUTING GUIDE — use this to match writer state to offer:

chains → For writers who need a contained, focused entry point. A specific chain when their block has a clear match:
- Chain 1 (The Life) or Chain 8 (Practice): no consistent practice, writing in the margins, can't make it stick
- Chain 2 (The Craft): sentences aren't landing, technical insecurity, wants to feel the mechanics
- Chain 3 (The Secrets): doesn't know what their work is worth, avoids the business side entirely
- Chain 4 (The Eye): can't tell if their work is good, needs critical judgment, reads too little
- Chain 5 (Voice): knows what they want to write but sounds like someone else on the page
- Chain 6 (Narrative): working on fiction, stories aren't holding together, structure is the problem
- Chain 7 (World): building fictional worlds, wants inhabited specificity
- Chain 8 (Practice): ready to make writing a condition of being, not just an activity

books → For writers who work best alone with a physical companion; want something to return to rather than a course; intuitive learners who resist structure but respond to oblique approaches. Route to books/deck.

school → For writers who are ready to commit to real ongoing development; want community and feedback; have a practice but need sustained engagement. Route to Patreon.

READING PRESCRIPTION GUIDANCE:
Be specific. Name the actual book. Some options calibrated to different states:
- Voice/identity: "A Thousand Plateaus" by Deleuze & Guattari (on becoming), "The Argonauts" by Maggie Nelson, "Bluets" by Maggie Nelson
- Practice/showing up: "The War of Art" by Pressfield, "Bird by Bird" by Lamott, "Writing Down the Bones" by Goldberg
- Narrative/structure: "Story" by McKee, "The Art of Fiction" by Gardner, "Steering the Craft" by Le Guin
- Permission/voice: "Big Magic" by Gilbert, "The Artist's Way" by Cameron, any Mary Oliver essay collection
- Literary models: recommend a specific fiction title that models what they're trying to do, based on what they said they want to write
- For the blocked: "The Creative Habit" by Twyla Tharp, "Imaginative Writing" by Janet Burroway

After producing the spread, stay available. You can answer questions about the School, the Chains, or their writing situation.

START: Open with two sentences — warm, specific, literary. Don't introduce yourself as an AI or a system. Just begin, as the School. Then ask Q1.`;

let history = [];
let spreadGenerated = false;
let isLoading = false;
let questionCount = 0;

function updateProgress(n) {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById('dot-' + i);
    const line = document.getElementById('line-' + i);
    if (dot) dot.className = 'progress-dot' + (i < n ? ' done' : i === n ? ' active' : '');
    if (line) line.className = 'progress-line' + (i < n ? ' done' : '');
  }
}

function scrollBottom() {
  const area = document.getElementById('chat-area');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

function showTyping(on) {
  document.getElementById('typing').className = 'typing-row' + (on ? ' on' : '');
  if (on) scrollBottom();
}

function addMsg(role, text) {
  const area = document.getElementById('chat-area');
  const typing = document.getElementById('typing');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'assistant' ? 'school' : 'writer');
  const lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = role === 'assistant' ? 'The School' : 'You';
  const bub = document.createElement('div');
  bub.className = 'msg-bubble';
  bub.innerHTML = text.replace(/\n/g, '<br>');
  div.appendChild(lbl);
  div.appendChild(bub);
  area.insertBefore(div, typing);
  scrollBottom();

  if (role === 'assistant') {
    const qMatches = ['Q1','Q2','Q3','Q4','Q5'].filter(q =>
      history.some(m => m.role === 'assistant' && m.content && m.content.includes(q))
    );
    updateProgress(Math.min(qMatches.length, 4));
  }
}

function extractSpread(text) {
  const s = text.search(/\[SPREAD_START\]/i);
  const e = text.search(/\[SPREAD_END\]/i);
  if (s !== -1 && e !== -1 && e > s) {
    return {
      json: text.slice(s + 13, e).trim(),
      before: text.slice(0, s).trim(),
      after: text.slice(e + 11).trim()
    };
  }
  return null;
}

const OFFER_URLS = {
  chains: 'https://arough.trade/chains',
  books: 'https://stagandbirch.com/collection/wild-magic',
  school: 'https://patreon.com/jacobtwop'
};

const OFFER_LABELS = {
  chains: 'Find your Chain →',
  books: 'Visit the Shop →',
  school: 'Join the School →'
};

function buildSpread(data) {
  const wrap = document.createElement('div');
  wrap.className = 'spread-wrap';

  const titleEl = document.createElement('div');
  titleEl.className = 'spread-title';
  titleEl.innerHTML = '<div class="spread-title-line"></div><span>Your Reading</span><div class="spread-title-line r"></div>';
  wrap.appendChild(titleEl);

  const cross = document.createElement('div');
  cross.className = 'tarot-cross';

  // Top card — Practice
  cross.appendChild(buildCard('top-card', 'The Practice', data.practice));

  // Center stack — State + Covering
  const centerStack = document.createElement('div');
  centerStack.className = 'center-stack';
  centerStack.appendChild(buildCard('center-card', 'Your State', data.state, true));
  centerStack.appendChild(buildCard('crossing-card', 'What Covers It', data.covering, false, true));
  cross.appendChild(centerStack);

  // Right card — Reading
  cross.appendChild(buildCard('right-card', 'The Reading', data.reading));

  // Left card — (spacer / additional context if needed, reuse practice position)
  const leftSpacer = document.createElement('div');
  leftSpacer.className = 'tarot-card left-card';
  leftSpacer.style.cssText = 'display:flex; align-items:center; justify-content:center; background: transparent; border-color: rgba(200,150,42,0.08);';
  leftSpacer.innerHTML = '<span style="font-family:var(--font-sc); font-size:32px; color:rgba(200,150,42,0.15); letter-spacing:0.1em;">✦</span>';
  cross.appendChild(leftSpacer);

  // Bottom card — Path (with link)
  cross.appendChild(buildPathCard(data.path));

  wrap.appendChild(cross);
  return wrap;
}

function buildCard(className, position, cardData, isCenter, isCrossing) {
  const card = document.createElement('div');
  card.className = 'tarot-card ' + className;

  const pos = document.createElement('div');
  pos.className = 'card-position';
  pos.textContent = position;
  card.appendChild(pos);

  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = cardData.name || '';
  card.appendChild(name);

  const rule = document.createElement('div');
  rule.className = 'card-rule';
  card.appendChild(rule);

  const text = document.createElement('div');
  text.className = 'card-text';
  text.textContent = cardData.text || '';
  card.appendChild(text);

  return card;
}

function buildPathCard(pathData) {
  const url = OFFER_URLS[pathData.offer] || OFFER_URLS.chains;
  const label = OFFER_LABELS[pathData.offer] || OFFER_LABELS.chains;

  const card = document.createElement('a');
  card.className = 'rec-card tarot-card';
  card.href = url;
  card.target = '_blank';
  card.rel = 'noopener';

  const pos = document.createElement('div');
  pos.className = 'card-position';
  pos.textContent = 'The Path Forward';
  card.appendChild(pos);

  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = pathData.name || '';
  card.appendChild(name);

  const rule = document.createElement('div');
  rule.className = 'card-rule';
  card.appendChild(rule);

  const text = document.createElement('div');
  text.className = 'card-text';
  let fullText = pathData.text || '';
  if (pathData.chain) fullText += '\n\n' + pathData.chain + '.';
  text.textContent = fullText;
  card.appendChild(text);

  const cta = document.createElement('span');
  cta.className = 'rec-cta';
  cta.textContent = label;
  card.appendChild(cta);

  return card;
}

function insertSpread(spreadData) {
  const area = document.getElementById('chat-area');
  const typing = document.getElementById('typing');
  let parsed;
  try {
    const clean = spreadData.replace(/```json|```/g, '').trim();
    parsed = JSON.parse(clean);
  } catch (e) {
    addMsg('assistant', 'The spread is ready, but something went wrong rendering it. ' + e.message);
    console.error('Spread parse error:', e, spreadData);
    return;
  }
  const spreadEl = buildSpread(parsed);
  area.insertBefore(spreadEl, typing);
  updateProgress(5);
  scrollBottom();
}

async function send(userText, silent) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  if (userText && !silent) {
    history.push({ role: 'user', content: userText });
    addMsg('user', userText);
  } else if (userText && silent) {
    history.push({ role: 'user', content: userText });
  }

  showTyping(true);

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: MODEL, max_tokens: 1500, system: SYSTEM, messages: history })
    });

    const data = await res.json();
    showTyping(false);

    if (data.error) {
      addMsg('assistant', 'Something went wrong. ' + (data.error.message || ''));
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      return;
    }

    const block = data.content && data.content.find(b => b.type === 'text');
    if (!block) throw new Error('no text');
    const raw = block.text;

    const spread = extractSpread(raw);
    if (spread && !spreadGenerated) {
      spreadGenerated = true;
      if (spread.before) addMsg('assistant', spread.before);
      history.push({ role: 'assistant', content: raw });
      setTimeout(() => {
        insertSpread(spread.json);
        if (spread.after) setTimeout(() => addMsg('assistant', spread.after), 500);
      }, 400);
    } else {
      addMsg('assistant', raw);
      history.push({ role: 'assistant', content: raw });
    }

  } catch (err) {
    showTyping(false);
    addMsg('assistant', 'Something interrupted the reading. Try again in a moment.');
    console.error(err);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

const input = document.getElementById('user-input');
input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const v = this.value.trim();
    if (v) { this.value = ''; this.style.height = 'auto'; send(v, false); }
  }
});
document.getElementById('send-btn').addEventListener('click', () => {
  const v = input.value.trim();
  if (v) { input.value = ''; input.style.height = 'auto'; send(v, false); }
});

// Boot
setTimeout(() => {
  document.getElementById('boot').classList.add('out');
  setTimeout(() => {
    document.getElementById('boot').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    history.push({ role: 'user', content: '[SYSTEM: A writer has arrived for their Wild Reading. Open with two sentences — warm, literary, specific. Then ask Q1.]' });
    send(null, true);
  }, 1200);
}, 2800);
</script>
